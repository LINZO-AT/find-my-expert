_schema-version: "3.1"
ID: find-my-expert
version: 1.0.0
description: "Find My Expert — SAP Austria Internal Expert Directory"

parameters:
  deploy_mode: html5-repo
  enable-parallel-deployments: true

build-parameters:
  before-all:
    - builder: custom
      commands:
        - npm install --package-lock-only
        - npm ci
        - npx cds build --production

modules:
  # --------------- SERVER MODULE ---------------
  - name: find-my-expert-srv
    type: nodejs
    path: gen/srv
    parameters:
      buildpack: nodejs_buildpack
      memory: 256M
      disk-quota: 512M
      readiness-health-check-type: http
      readiness-health-check-http-endpoint: /health
    build-parameters:
      builder: npm
    provides:
      - name: srv-api
        properties:
          srv-url: ${default-url}
    requires:
      - name: find-my-expert-auth
      - name: find-my-expert-db

  # --------------- DATABASE MODULE (PostgreSQL) ---------------
  - name: find-my-expert-db-deployer
    type: nodejs
    path: gen/pg
    parameters:
      buildpack: nodejs_buildpack
      memory: 128M
      disk-quota: 512M
      no-route: true
      no-start: true
      tasks:
        - name: deploy-to-postgresql
          command: npx cds-deploy
    requires:
      - name: find-my-expert-db

  # --------------- DESTINATIONS (Managed AppRouter via Work Zone) ---------------
  - name: find-my-expert-destinations
    type: com.sap.application.content
    requires:
      - name: find-my-expert-auth
        parameters:
          service-key:
            name: find-my-expert-auth-key
      - name: find-my-expert-repo-runtime
        parameters:
          service-key:
            name: find-my-expert-repo-runtime-key
      - name: srv-api
      - name: find-my-expert-destination-service
        parameters:
          content-target: true
    parameters:
      content:
        instance:
          destinations:
            - Authentication: OAuth2UserTokenExchange
              Name: find-my-expert-srv-api
              TokenServiceInstanceName: find-my-expert-auth
              TokenServiceKeyName: find-my-expert-auth-key
              URL: ~{srv-api/srv-url}
              HTML5.DynamicDestination: true
              HTML5.ForwardAuthToken: true
            - Name: find-my-expert-html5-repo-runtime
              ServiceInstanceName: find-my-expert-repo-runtime
              ServiceKeyName: find-my-expert-repo-runtime-key
              sap.cloud.service: findmyexpert
          existing_destinations_policy: update
    build-parameters:
      no-source: true

  # --------------- UI APPS (HTML5 Content Deployer) ---------------
  - name: find-my-expert-app-content
    type: com.sap.application.content
    path: .
    requires:
      - name: find-my-expert-repo-host
        parameters:
          content-target: true
    build-parameters:
      build-result: resources
      requires:
        - name: findmyexpert-search
          artifacts:
            - findmyexpert-search.zip
          target-path: resources/
        - name: findmyexpert-manage-experts
          artifacts:
            - findmyexpert-manage-experts.zip
          target-path: resources/
        - name: findmyexpert-manage-roles
          artifacts:
            - findmyexpert-manage-roles.zip
          target-path: resources/
        - name: findmyexpert-manage-topics
          artifacts:
            - findmyexpert-manage-topics.zip
          target-path: resources/

  # --- Individual UI5 App Builds ---
  - name: findmyexpert-search
    type: html5
    path: app/findmyexpert-search
    build-parameters:
      build-result: dist
      builder: custom
      commands:
        - npm install
        - npx ui5 build --clean-dest --dest build_output
        - mkdir -p dist
        - bash -c "OUTDIR=$(pwd)/dist && cd build_output && npx -y bestzip $OUTDIR/findmyexpert-search.zip *"
      supported-platforms: []

  - name: findmyexpert-manage-experts
    type: html5
    path: app/findmyexpert-manage-experts
    build-parameters:
      build-result: dist
      builder: custom
      commands:
        - npm install
        - npx ui5 build --clean-dest --dest build_output
        - mkdir -p dist
        - bash -c "OUTDIR=$(pwd)/dist && cd build_output && npx -y bestzip $OUTDIR/findmyexpert-manage-experts.zip *"
      supported-platforms: []

  - name: findmyexpert-manage-roles
    type: html5
    path: app/findmyexpert-manage-roles
    build-parameters:
      build-result: dist
      builder: custom
      commands:
        - npm install
        - npx ui5 build --clean-dest --dest build_output
        - mkdir -p dist
        - bash -c "OUTDIR=$(pwd)/dist && cd build_output && npx -y bestzip $OUTDIR/findmyexpert-manage-roles.zip *"
      supported-platforms: []

  - name: findmyexpert-manage-topics
    type: html5
    path: app/findmyexpert-manage-topics
    build-parameters:
      build-result: dist
      builder: custom
      commands:
        - npm install
        - npx ui5 build --clean-dest --dest build_output
        - mkdir -p dist
        - bash -c "OUTDIR=$(pwd)/dist && cd build_output && npx -y bestzip $OUTDIR/findmyexpert-manage-topics.zip *"
      supported-platforms: []

resources:
  # --------------- XSUAA ---------------
  - name: find-my-expert-auth
    type: org.cloudfoundry.managed-service
    parameters:
      service: xsuaa
      service-plan: application
      path: xs-security.json
      config:
        xsappname: findmyexpert-${org}-${space}
        tenant-mode: dedicated

  # --------------- PostgreSQL ---------------
  - name: find-my-expert-db
    type: org.cloudfoundry.managed-service
    parameters:
      service: postgresql-db
      service-plan: standard

  # --------------- HTML5 Repo Host ---------------
  - name: find-my-expert-repo-host
    type: org.cloudfoundry.managed-service
    parameters:
      service: html5-apps-repo
      service-plan: app-host

  # --------------- HTML5 Repo Runtime ---------------
  - name: find-my-expert-repo-runtime
    type: org.cloudfoundry.managed-service
    parameters:
      service: html5-apps-repo
      service-plan: app-runtime

  # --------------- Destination Service ---------------
  - name: find-my-expert-destination-service
    type: org.cloudfoundry.managed-service
    parameters:
      service: destination
      service-plan: lite
      config:
        HTML5Runtime_enabled: true
