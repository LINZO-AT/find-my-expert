specVersion: "3.0"
metadata:
  name: com.sap.austria.findmyexpert
type: application
framework:
  name: SAPUI5
  version: "1.132"
  libraries:
    - name: sap.m
    - name: sap.f
    - name: sap.ui.core
    - name: sap.ui.layout
    - name: sap.ui.unified
server:
  customMiddleware:
    - name: ui5-middleware-simpleproxy
      afterMiddleware: compression
      mountPath: /odata
      configuration:
        baseUri: http://localhost:4004/odata
