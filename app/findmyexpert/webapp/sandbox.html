<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Find My Expert – Fiori Launchpad Sandbox</title>

  <script>
    // FLP Sandbox Config — loaded before bootstrap
    window["sap-ushell-config"] = {
      defaultRenderer: "fiori2",
      renderers: {
        fiori2: {
          componentData: {
            config: {
              search: "hidden",
              moveAppTitleToHeader: true
            }
          }
        }
      },
      services: {
        NavTargetResolution: {
          config: { enableClientSideTargetResolution: true }
        },
        ClientSideTargetResolution: {
          adapter: {
            config: {
              inbounds: {
                "FindMyExpert-display": {
                  semanticObject: "FindMyExpert",
                  action: "display",
                  title: "Find My Expert",
                  icon: "sap-icon://employee-lookup",
                  deviceTypes: { desktop: true, tablet: true, phone: true },
                  resolutionResult: {
                    applicationType: "SAPUI5",
                    additionalInformation: "SAPUI5.Component=com.sap.austria.findmyexpert",
                    url: "./",
                    text: "Find My Expert",
                    ui5ComponentName: "com.sap.austria.findmyexpert"
                  },
                  signature: { parameters: {}, additionalParameters: "allowed" }
                },
                "FindMyExpert-manage": {
                  semanticObject: "FindMyExpert",
                  action: "manage",
                  title: "Experten verwalten",
                  icon: "sap-icon://manager",
                  deviceTypes: { desktop: true, tablet: true, phone: true },
                  resolutionResult: {
                    applicationType: "SAPUI5",
                    additionalInformation: "SAPUI5.Component=com.sap.austria.findmyexpert",
                    url: "./",
                    text: "Experten verwalten",
                    ui5ComponentName: "com.sap.austria.findmyexpert"
                  },
                  signature: { parameters: {}, additionalParameters: "allowed" }
                }
              }
            }
          }
        },
        LaunchPage: {
          adapter: {
            config: {
              groups: [{
                id: "findmyexpert_group",
                title: "SAP Austria — Experten",
                isPreset: true,
                isVisible: true,
                isGroupLocked: false,
                tiles: [
                  {
                    id: "tile_fme_search",
                    tileType: "sap.ushell.ui.tile.StaticTile",
                    properties: {
                      title: "Find My Expert",
                      subtitle: "Experten-Suche",
                      info: "AI-powered Expert Directory",
                      icon: "sap-icon://employee-lookup",
                      targetURL: "#FindMyExpert-display"
                    }
                  },
                  {
                    id: "tile_fme_manage",
                    tileType: "sap.ushell.ui.tile.StaticTile",
                    properties: {
                      title: "Experten verwalten",
                      subtitle: "Admin",
                      info: "Experten und Lösungen pflegen",
                      icon: "sap-icon://manager",
                      targetURL: "#FindMyExpert-manage"
                    }
                  }
                ]
              }]
            }
          }
        },
        UserInfo: {
          adapter: {
            config: {
              user: {
                firstName: "Admin",
                lastName: "User",
                fullName: "Admin User",
                email: "admin@sap.com",
                id: "admin@sap.com"
              }
            }
          }
        }
      }
    };
  </script>

  <script
    src="https://ui5.sap.com/1.132.1/test-resources/sap/ushell/bootstrap/sandbox.js"
    id="sap-ushell-bootstrap">
  </script>

  <script
    id="sap-ui-bootstrap"
    src="https://ui5.sap.com/1.132.1/resources/sap-ui-core.js"
    data-sap-ui-libs="sap.m,sap.ushell,sap.f,sap.f.cards,sap.uxap,sap.ui.layout,sap.ui.unified"
    data-sap-ui-theme="sap_horizon"
    data-sap-ui-compat-version="edge"
    data-sap-ui-async="true"
    data-sap-ui-resource-roots='{"com.sap.austria.findmyexpert": "./"}'
    data-sap-ui-frame-options="allow">
  </script>

  <script>
    sap.ui.getCore().attachInit(function () {
      sap.ushell.Container.createRendererInternal("fiori2").then(function (oRenderer) {
        oRenderer.placeAt("content");
      });
    });
  </script>
</head>
<body class="sapUiBody" id="content"></body>
</html>
