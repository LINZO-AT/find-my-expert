<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<title>Find My Expert – FLP Sandbox</title>
		<script>
			window["sap-ushell-config"] = {
				defaultRenderer: "fiori2",
				renderers: {
					fiori2: {
						componentData: {
							config: {
								search: "hidden"
							}
						}
					}
				},
				bootstrapPlugins: {},
				services: {
					NavTargetResolution: {
						config: {
							enableClientSideTargetResolution: true
						}
					},
					ClientSideTargetResolution: {
						adapter: {
							config: {
								inbounds: {
									"findmyexpert-display": {
										semanticObject: "findmyexpert",
										action: "display",
										title: "Find My Expert",
										info: "Experten-Suche & Verwaltung",
										icon: "sap-icon://employee",
										signature: {
											parameters: {},
											additionalParameters: "allowed"
										},
										resolutionResult: {
											applicationType: "SAPUI5",
											additionalInformation: "SAPUI5.Component=com.sap.austria.findmyexpert",
											url: "/findmyexpert/webapp"
										}
									}
								}
							}
						}
					},
					LaunchPage: {
						adapter: {
							config: {
								catalogs: [],
								groups: [
									{
										id: "findmyexpert_group",
										title: "Find My Expert",
										isPreset: true,
										isVisible: true,
										isGroupLocked: false,
										tiles: [
											{
												id: "findmyexpert-tile",
												title: "Find My Expert",
												size: "1x1",
												tileType: "sap.ushell.ui.tile.StaticTile",
												properties: {
													title: "Find My Expert",
													subtitle: "Experten-Suche & Verwaltung",
													icon: "sap-icon://employee",
													targetURL: "#findmyexpert-display"
												}
											}
										]
									}
								]
							}
						}
					}
				}
			};
		</script>
		<!-- ushell standalone sandbox bootstrap (UI5 1.120+) -->
		<script id="sap-ushell-bootstrap"
			src="https://ui5.sap.com/1.132.1/test-resources/sap/ushell/bootstrap/sandbox.js">
		</script>
		<script id="sap-ui-bootstrap"
			src="https://ui5.sap.com/1.132.1/resources/sap-ui-core.js"
			data-sap-ui-libs="sap.m,sap.f,sap.ui.layout,sap.ui.unified,sap.uxap"
			data-sap-ui-compat-version="edge"
			data-sap-ui-theme="sap_horizon"
			data-sap-ui-async="true"
			data-sap-ui-preload=""
			data-sap-ui-frame-options="trusted"
			data-sap-ui-resource-roots='{ "com.sap.austria.findmyexpert": "/findmyexpert/webapp" }'>
		</script>
		<script>
			sap.ui.getCore
				? sap.ui.getCore().attachInit(function () {
					sap.ui.require(["sap/ushell/Container"], function (Container) {
						if (Container) {
							Container.createRenderer("fiori2", true).then(function (oContent) {
								oContent.placeAt("content");
							}).catch(function (oError) {
								document.getElementById("content").innerHTML =
									"<h2 style='padding:2rem;color:#cc0000'>FLP Renderer failed: " + (oError && oError.message) + "</h2>";
							});
						} else {
							document.getElementById("content").innerHTML =
								"<h2 style='padding:2rem;color:#cc0000'>FLP Container not available. Check console.</h2>";
						}
					});
				})
				: (document.getElementById("content").innerHTML =
					"<h2 style='padding:2rem;color:#cc0000'>UI5 Core not loaded. Check network/CSP.</h2>");
		</script>
	</head>
	<body class="sapUiBody" id="content"></body>
</html>
