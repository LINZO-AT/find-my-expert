<!doctype html>
<html lang="en">
  <head>
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Find My Expert</title>

    <script type="text/javascript">
      window["sap-ushell-config"] = {
        defaultRenderer: "fiori2",
        renderers: {
          fiori2: {
            componentData: {
              config: {
                search: "hidden",
                enableSearch: false
              }
            }
          }
        },
        applications: {
          "Expert-search": {
            title: "Find My Expert",
            description: "Expert directory search",
            additionalInformation: "SAPUI5.Component=findmyexpertSearch",
            applicationType: "URL",
            url: "./"
          }
        }
      };
    </script>

    <script
      src="https://sapui5.hana.ondemand.com/1.136.7/test-resources/sap/ushell/bootstrap/sandbox.js"
      id="sap-ushell-bootstrap"
    ></script>
    <script
      id="sap-ui-bootstrap"
      src="https://sapui5.hana.ondemand.com/1.136.7/resources/sap-ui-core.js"
      data-sap-ui-libs=""
      data-sap-ui-async="true"
      data-sap-ui-preload="async"
      data-sap-ui-theme="sap_horizon"
      data-sap-ui-compatVersion="edge"
      data-sap-ui-resourceroots='{"findmyexpertSearch": "./"}'
      data-sap-ui-frameOptions="allow"
      data-sap-ui-flexibilityServices='[{"connector": "LocalStorageConnector"}]'
    ></script>
    <script>
      sap.ui.getCore().attachInit(function () {
        sap.ushell.Container.createRenderer().placeAt("content");
      });
    </script>
  </head>

  <body class="sapUiBody sapUiSizeCompact" id="content"></body>
</html>
