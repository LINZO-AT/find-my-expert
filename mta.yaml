_schema-version: "3.1"
ID: findmyexpert
description: SAP Expert Directory for SAP Austria
version: 1.0.0

modules:
  - name: findmyexpert-srv
    type: nodejs
    path: gen/srv
    parameters:
      buildpack: nodejs_buildpack
      readiness-health-check-type: http
      readiness-health-check-http-endpoint: /health
    build-parameters:
      builder: npm
    provides:
      - name: srv-api
        properties:
          srv-url: ${default-url}
    requires:
      - name: findmyexpert-db
      - name: findmyexpert-auth

  - name: findmyexpert-db-deployer
    type: hdb
    path: gen/db
    parameters:
      buildpack: nodejs_buildpack
    build-parameters:
      builder: npm
      ignore:
        - node_modules
        - package-lock.json
    requires:
      - name: findmyexpert-db

  - name: findmyexpert-approuter
    type: approuter.nodejs
    path: app/router
    parameters:
      keep-existing-routes: true
      disk-quota: 256M
      memory: 256M
    requires:
      - name: srv-api
        group: destinations
        properties:
          name: srv-api
          url: ~{srv-url}
          forwardAuthToken: true
      - name: findmyexpert-auth
      - name: findmyexpert-html5-runtime
    build-parameters:
      requires:
        - name: findmyexpert-search-deployer
        - name: findmyexpert-manage-experts-deployer
        - name: findmyexpert-manage-roles-deployer
        - name: findmyexpert-manage-topics-deployer

  - name: findmyexpert-search-deployer
    type: com.sap.application.content
    path: app/findmyexpert-search
    requires:
      - name: findmyexpert-html5-repo
        parameters:
          content-target: true
    build-parameters:
      build-result: dist
      requires:
        - name: findmyexpert-search-build
          artifacts:
            - dist/findmyexpert-search.zip
          target-path: dist

  - name: findmyexpert-search-build
    type: html5
    path: app/findmyexpert-search
    build-parameters:
      build-result: dist
      builder: custom
      commands:
        - npm install
        - npm run build
      supported-platforms: []

  - name: findmyexpert-manage-experts-deployer
    type: com.sap.application.content
    path: app/findmyexpert-manage-experts
    requires:
      - name: findmyexpert-html5-repo
        parameters:
          content-target: true
    build-parameters:
      build-result: dist
      requires:
        - name: findmyexpert-manage-experts-build
          artifacts:
            - dist/findmyexpert-manage-experts.zip
          target-path: dist

  - name: findmyexpert-manage-experts-build
    type: html5
    path: app/findmyexpert-manage-experts
    build-parameters:
      build-result: dist
      builder: custom
      commands:
        - npm install
        - npm run build
      supported-platforms: []

  - name: findmyexpert-manage-roles-deployer
    type: com.sap.application.content
    path: app/findmyexpert-manage-roles
    requires:
      - name: findmyexpert-html5-repo
        parameters:
          content-target: true
    build-parameters:
      build-result: dist
      requires:
        - name: findmyexpert-manage-roles-build
          artifacts:
            - dist/findmyexpert-manage-roles.zip
          target-path: dist

  - name: findmyexpert-manage-roles-build
    type: html5
    path: app/findmyexpert-manage-roles
    build-parameters:
      build-result: dist
      builder: custom
      commands:
        - npm install
        - npm run build
      supported-platforms: []

  - name: findmyexpert-manage-topics-deployer
    type: com.sap.application.content
    path: app/findmyexpert-manage-topics
    requires:
      - name: findmyexpert-html5-repo
        parameters:
          content-target: true
    build-parameters:
      build-result: dist
      requires:
        - name: findmyexpert-manage-topics-build
          artifacts:
            - dist/findmyexpert-manage-topics.zip
          target-path: dist

  - name: findmyexpert-manage-topics-build
    type: html5
    path: app/findmyexpert-manage-topics
    build-parameters:
      build-result: dist
      builder: custom
      commands:
        - npm install
        - npm run build
      supported-platforms: []

resources:
  - name: findmyexpert-db
    type: org.cloudfoundry.managed-service
    parameters:
      service: postgresql-db
      service-plan: trial
      service-name: findmyexpert-postgres

  - name: findmyexpert-auth
    type: org.cloudfoundry.managed-service
    parameters:
      service: xsuaa
      service-plan: application
      path: ./xs-security.json
      config:
        xsappname: findmyexpert-${org}-${space}
        tenant-mode: dedicated

  - name: findmyexpert-html5-repo
    type: org.cloudfoundry.managed-service
    parameters:
      service: html5-apps-repo
      service-plan: app-host

  - name: findmyexpert-html5-runtime
    type: org.cloudfoundry.managed-service
    parameters:
      service: html5-apps-repo
      service-plan: app-runtime
